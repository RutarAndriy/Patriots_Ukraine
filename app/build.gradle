apply plugin: 'com.android.application'

android {
    compileSdkVersion 28
    buildToolsVersion '28.0.3'
    defaultConfig {
        applicationId "com.rutar.patriots_ukraine"
        minSdkVersion 15
        targetSdkVersion 28
        versionCode 21
        versionName "5.0-alpha"
        vectorDrawables.useSupportLibrary = true
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {

    implementation files('libs/jsoup-1.11.2.jar')

    //noinspection GradleCompatible

    implementation 'com.android.support:design:28.0.0'                      // Бібліотека підтримки
    implementation 'com.android.support:recyclerview-v7:28.0.0'             // Прокручуваний список
    implementation 'com.github.aakira:expandable-layout:1.6.0@aar'             // Розширюваний view
    implementation 'com.prolificinteractive:material-calendarview:1.4.3'           // Календар view
    implementation 'com.android.support.constraint:constraint-layout:1.1.3' // Бібліотека підтримки

}
