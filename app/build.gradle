apply plugin: 'com.android.application'

android {
    compileSdkVersion 28
    buildToolsVersion "28.0.3"
    defaultConfig {
        applicationId "com.rutar.patriots_ukraine"
        minSdkVersion 14
        targetSdkVersion 28
        versionCode 19
        versionName "3.4"
        vectorDrawables.useSupportLibrary = true

    }
    buildTypes {
        release {
            //minifyEnabled false
            //proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {

    implementation files('libs/jsoup-1.9.2.jar')

    implementation 'com.nispok:snackbar:2.11.+'
    implementation 'com.pnikosis:materialish-progress:1.7'
    implementation 'com.wdullaer:materialdatetimepicker:3.1.0'

    //noinspection GradleCompatible
    //implementation 'com.android.support:design:28.0.0'
    //implementation 'com.android.support:appcompat-v7:28.0.0'

    implementation('com.mikepenz:materialdrawer:5.8.1@aar') {
        transitive = true
    }

}
